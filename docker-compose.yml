version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: harps-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harps-app
    restart: unless-stopped
    environment:
      NUXT_DATABASE_URL: postgresql://postgres:postgres@db:5432/harps?schema=public
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        pnpm prisma migrate deploy &&
        node .output/server/index.mjs
      "

volumes:
  postgres_data:
